<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" sizes="32x32" type="image/png" href="./assets/icons/spotify-icon.png">
</head>
<body>
  <div class="app">
    <!-- Dunk works on header -->
    <header></header>
  
    <!-- Egg works on sidebar -->
    <aside class="sidebar">
      <nav>
        <ul>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Pin.svg" alt="Pins" class="icon"></div>
              <span>Pins</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Playlist.svg" alt="Playlists" class="icon"></div>
              <span>Playlists</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Like.svg" alt="Liked Songs" class="icon"></div>
              <span>Liked Songs</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Save.svg" alt="Saved" class="icon"></div>
              <span>Saved</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Album.svg" alt="Albums" class="icon"></div>
              <span>Albums</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Folder.svg" alt="Folders" class="icon"></div>
              <span>Folders</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Podcast.svg" alt="Podcats" class="icon"></div>
              <span>Podcasts</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Audiobook.svg" alt="Audiobooks" class="icon"></div>
              <span>Audiobooks</span>
            </a>
          </li>
          <li>
            <a href="">
              <div class="icon-box"><img src="./assets/icons/sidebar/Property 1=Artist.svg" alt="Artists" class="icon"></div>
              <span>Artists</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>
  
    <main class="main"></main>
  </div>
</body>
</html>
